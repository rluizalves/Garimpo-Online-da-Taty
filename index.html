<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Garimpo Online da Taty</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f2f2f2;
    }

    header {
      background: #ce8383;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .produtos {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .produto {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      width: 220px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      background: green;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>

<body>

<header>
  <h1>Garimpo Online da Taty</h1>
  <p>Moda Sustentável com Estilo ♻️</p>
</header>

<section class="produtos">

  <div class="produto">
    <img src="fotos/vestido novo1.jpeg">
    <h3>Vestido Florido</h3>
    <p>R$ 79,90</p>
    <button onclick="comprar('Vestido Florido')">Comprar</button>
  </div>

  <div class="produto">
    <img src="fotos/saia rendada bege.jpeg">
    <h3>Saia Jeans</h3>
    <p>R$ 59,90</p>
    <button onclick="comprar('Saia Jeans')">Comprar</button>
  </div>

  <div class="produto">
    <img src="fotos/Vestido com bojo rendado.jpeg">
    <h3>Saia Rendada</h3>
    <p>R$ 39,90</p>
    <button onclick="comprar('Saia Rendada')">Comprar</button>
  </div>

</section>

<script>
  function comprar(produto) {
    const numero = "5524998520981"; // coloque seu WhatsApp
    const mensagem = `Olá! Quero comprar: ${produto}`;
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
    window.open(url, '_blank');
  }
</script>

</body>
</html>
